  <circle cx="310" cy="205" r="7" fill="#a09888"/><circle cx="310" cy="255" r="7" fill="#a09888"/><circle cx="310" cy="305" r="7" fill="#a09888"/>
  <circle cx="387" cy="205" r="7" fill="#a09888"/><circle cx="387" cy="255" r="7" fill="#a09888"/><circle cx="387" cy="305" r="7" fill="#a09888"/>
  <circle cx="464" cy="205" r="7" fill="#a09888"/><circle cx="464" cy="255" r="7" fill="#a09888"/><circle cx="464" cy="305" r="7" fill="#a09888"/>
  <circle cx="541" cy="205" r="7" fill="#a09888"/><circle cx="541" cy="255" r="7" fill="#a09888"/><circle cx="541" cy="305" r="7" fill="#a09888"/>
