  <line x1="387" y1="205" x2="464" y2="255" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="464" y1="205" x2="387" y2="255" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="464" y1="205" x2="541" y2="255" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="541" y1="205" x2="464" y2="255" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="233" y1="255" x2="310" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="255" x2="233" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="255" x2="387" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="387" y1="255" x2="310" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="387" y1="255" x2="464" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="464" y1="255" x2="387" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="464" y1="255" x2="541" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="541" y1="255" x2="464" y2="305" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
