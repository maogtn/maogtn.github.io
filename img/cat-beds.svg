  <line x1="235" y1="296" x2="235" y2="351" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="565" y1="296" x2="565" y2="351" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
