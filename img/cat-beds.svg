  <rect width="800" height="500" fill="url(#b-lamp1)" opacity="0.9"/>
  <rect width="800" height="500" fill="url(#b-lamp2)" opacity="0.9"/>
  <!-- Rug -->
  <ellipse cx="400" cy="430" rx="200" ry="28" fill="rgba(100,120,160,0.15)"/>
