  <rect x="30" y="310" width="90" height="90" rx="6" fill="#1a2238"/>
  <rect x="680" y="310" width="90" height="90" rx="6" fill="#1a2238"/>
  <rect x="30" y="310" width="90" height="30" rx="6" fill="#243050"/>
  <rect x="680" y="310" width="90" height="30" rx="6" fill="#243050"/>
  <!-- Lamps on bedside tables -->
  <polygon points="75,268 100,308 50,308" fill="#c8b890"/>
  <rect x="72" y="308" width="6" height="15" fill="#a09070"/>
  <rect x="55" y="323" width="40" height="6" rx="2" fill="#8a7858"/>
  <polygon points="725,268 750,308 700,308" fill="#c8b890"/>
  <rect x="722" y="308" width="6" height="15" fill="#a09070"/>
  <rect x="705" y="323" width="40" height="6" rx="2" fill="#8a7858"/>
