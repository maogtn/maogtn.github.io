  <line x1="0" y1="455" x2="800" y2="437" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="500" x2="270" y2="334" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
