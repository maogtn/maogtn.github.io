  <rect x="160" y="296" width="150" height="55" rx="10" fill="#f0ece4"/>
  <rect x="490" y="296" width="150" height="55" rx="10" fill="#f0ece4"/>
  <rect x="315" y="300" width="170" height="50" rx="10" fill="#e8e2d8" opacity="0.9"/>
