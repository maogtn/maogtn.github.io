  <line x1="310" y1="205" x2="233" y2="255" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="205" x2="387" y2="255" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
