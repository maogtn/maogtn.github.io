<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="b-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1e2d4a"/>
    </linearGradient>
    <linearGradient id="b-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2238"/>
      <stop offset="100%" stop-color="#0a0e18"/>
    </linearGradient>
    <linearGradient id="b-head" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8cfc5"/>
      <stop offset="100%" stop-color="#b0a898"/>
    </linearGradient>
    <linearGradient id="b-duvet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e2d8"/>
      <stop offset="100%" stop-color="#c8c0b0"/>
    </linearGradient>
    <radialGradient id="b-lamp1" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b-lamp2" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#b-bg)"/>
  <polygon points="0,370 800,330 800,500 0,500" fill="url(#b-floor)"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
