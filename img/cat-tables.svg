<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="t-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a10"/>
      <stop offset="100%" stop-color="#1e2e18"/>
    </linearGradient>
    <linearGradient id="t-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2614"/>
      <stop offset="100%" stop-color="#080e06"/>
    </linearGradient>
    <linearGradient id="t-table" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a870"/>
      <stop offset="100%" stop-color="#8a6835"/>
    </linearGradient>
    <linearGradient id="t-chair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1e14"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <radialGradient id="t-candle" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#ffcc60" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffcc60" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-overhead" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#fff4d0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff4d0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#t-bg)"/>
  <!-- Floor -->
  <polygon points="0,360 800,320 800,500 0,500" fill="url(#t-floor)"/>
  <!-- Floor lines (wood grain suggestion) -->
  <line x1="0" y1="400" x2="800" y2="375" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="440" x2="800" y2="422" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="470" x2="800" y2="457" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <!-- Vertical floor planks -->
  <line x1="150" y1="360" x2="130" y2="500" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
  <line x1="350" y1="340" x2="330" y2="500" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
  <line x1="560" y1="335" x2="545" y2="500" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
  <line x1="720" y1="330" x2="710" y2="500" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
  <!-- Wall art / framed picture -->
  <rect x="320" y="80" width="160" height="110" rx="3" fill="none" stroke="rgba(180,150,90,0.3)" stroke-width="2"/>
  <rect x="328" y="88" width="144" height="94" rx="2" fill="rgba(180,150,90,0.06)"/>
  <line x1="320" y1="135" x2="480" y2="135" stroke="rgba(180,150,90,0.1)" stroke-width="1"/>
  <ellipse cx="400" cy="120" rx="35" ry="28" fill="rgba(180,150,90,0.08)" stroke="rgba(180,150,90,0.15)" stroke-width="1"/>
  <!-- DINING TABLE - top surface -->
  <ellipse cx="400" cy="295" rx="220" ry="45" fill="url(#t-table)"/>
  <!-- Table top edge highlight -->
  <ellipse cx="400" cy="295" rx="220" ry="45" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- Table wood grain lines -->
  <line x1="200" y1="285" x2="600" y2="285" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <line x1="185" y1="295" x2="615" y2="295" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <line x1="200" y1="305" x2="600" y2="305" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <!-- Table pedestal base -->
  <rect x="370" y="335" width="60" height="18" rx="4" fill="#6a5020"/>
  <ellipse cx="400" cy="353" rx="70" ry="12" fill="#5a4018"/>
  <rect x="330" y="353" width="140" height="10" rx="5" fill="#4a3010"/>
  <!-- Table legs from base -->
  <line x1="360" y1="363" x2="340" y2="395" stroke="#4a3010" stroke-width="10" stroke-linecap="round"/>
  <line x1="440" y1="363" x2="460" y2="395" stroke="#4a3010" stroke-width="10" stroke-linecap="round"/>
  <line x1="380" y1="363" x2="375" y2="395" stroke="#4a3010" stroke-width="8" stroke-linecap="round"/>
  <line x1="420" y1="363" x2="425" y2="395" stroke="#4a3010" stroke-width="8" stroke-linecap="round"/>
  <!-- CHAIRS - Left side (2) -->
  <!-- Chair back left-far -->
  <rect x="78" y="230" width="80" height="70" rx="8" fill="url(#t-chair)"/>
  <rect x="86" y="238" width="64" height="54" rx="6" fill="#3a2818" opacity="0.6"/>
  <!-- Chair seat left-far -->
  <rect x="72" y="295" width="92" height="18" rx="6" fill="#3a2818"/>
  <!-- Chair legs left-far -->
  <line x1="82" y1="313" x2="78" y2="370" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <line x1="154" y1="313" x2="158" y2="370" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <!-- Chair back left-near -->
  <rect x="135" y="245" width="85" height="68" rx="8" fill="url(#t-chair)"/>
  <rect x="143" y="253" width="69" height="52" rx="6" fill="#3a2818" opacity="0.6"/>
  <!-- Chair seat left-near -->
  <rect x="128" y="308" width="98" height="18" rx="6" fill="#3a2818"/>
  <!-- Chair legs left-near -->
  <line x1="138" y1="326" x2="133" y2="382" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <line x1="216" y1="326" x2="221" y2="382" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <!-- CHAIRS - Right side (2) -->
  <!-- Chair back right-near -->
  <rect x="580" y="245" width="85" height="68" rx="8" fill="url(#t-chair)"/>
  <rect x="588" y="253" width="69" height="52" rx="6" fill="#3a2818" opacity="0.6"/>
  <rect x="573" y="308" width="98" height="18" rx="6" fill="#3a2818"/>
  <line x1="583" y1="326" x2="578" y2="382" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <line x1="661" y1="326" x2="666" y2="382" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <!-- Chair back right-far -->
  <rect x="640" y="230" width="80" height="70" rx="8" fill="url(#t-chair)"/>
  <rect x="648" y="238" width="64" height="54" rx="6" fill="#3a2818" opacity="0.6"/>
  <rect x="633" y="295" width="92" height="18" rx="6" fill="#3a2818"/>
  <line x1="643" y1="313" x2="638" y2="370" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <line x1="715" y1="313" x2="720" y2="370" stroke="#2a1808" stroke-width="8" stroke-linecap="round"/>
  <!-- TABLE SETTING - candles -->
  <rect x="390" y="262" width="8" height="28" rx="2" fill="#f0e8d0"/>
  <rect x="402" y="265" width="8" height="26" rx="2" fill="#f0e8d0"/>
  <!-- Candle flames -->
  <ellipse cx="394" cy="260" rx="4" ry="6" fill="#ffcc40" opacity="0.9"/>
  <ellipse cx="394" cy="260" rx="2" ry="4" fill="#fff0a0"/>
  <ellipse cx="406" cy="263" rx="4" ry="6" fill="#ffcc40" opacity="0.9"/>
  <ellipse cx="406" cy="263" rx="2" ry="4" fill="#fff0a0"/>
  <!-- Candle glow -->
  <rect x="350" y="230" width="100" height="100" fill="url(#t-candle)" opacity="0.8"/>
  <!-- Table setting - plates left -->
  <ellipse cx="290" cy="290" rx="30" ry="12" fill="#e0d8c8"/>
  <ellipse cx="290" cy="290" rx="22" ry="9" fill="#ede8e0"/>
  <!-- Table setting - plates right -->
  <ellipse cx="510" cy="290" rx="30" ry="12" fill="#e0d8c8"/>
  <ellipse cx="510" cy="290" rx="22" ry="9" fill="#ede8e0"/>
  <!-- Glasses -->
  <ellipse cx="320" cy="278" rx="6" ry="3" fill="rgba(200,220,255,0.3)"/>
  <rect x="317" y="258" width="6" height="22" rx="2" fill="rgba(200,220,255,0.25)"/>
  <ellipse cx="540" cy="278" rx="6" ry="3" fill="rgba(200,220,255,0.3)"/>
  <rect x="537" y="258" width="6" height="22" rx="2" fill="rgba(200,220,255,0.25)"/>
  <!-- Overhead lamp -->
  <line x1="400" y1="0" x2="400" y2="65" stroke="rgba(180,150,90,0.4)" stroke-width="2"/>
  <ellipse cx="400" cy="70" rx="45" ry="18" fill="#6a5020"/>
  <ellipse cx="400" cy="78" rx="40" ry="14" fill="#ffe4a0" opacity="0.9"/>
  <!-- Overhead glow -->
  <rect width="800" height="500" fill="url(#t-overhead)" opacity="0.8"/>
  <!-- Candle ambient glow overlay -->
  <ellipse cx="400" cy="290" rx="180" ry="60" fill="rgba(255,180,60,0.05)"/>
  <!-- Rug under table -->
  <ellipse cx="400" cy="400" rx="195" ry="28" fill="rgba(60,90,40,0.2)"/>
</svg>
